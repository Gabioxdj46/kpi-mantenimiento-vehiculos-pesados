<script>
  google.charts.load('current', { packages: ['corechart', 'bar', 'table', 'gauge'] });

  const state = {
    bootstrap: null,
    filters: {},
    activeTab: 'dashboard',
    dashboard: null,
    general: null,
    alerts: null,
    fleetProjectChanges: {},
    routeDeletes: {}
  };

  const FLEET_IMPORT_ORDER = ['plate', 'project', 'type', 'brand', 'model', 'motorSerial', 'chassisSerial', 'year', 'color', 'motorCycleKm', 'boxCycleKm'];
  const MAINTENANCE_IMPORT_ORDER = ['plate', 'workshop', 'entryDate', 'exitDate', 'type', 'odometer', 'kmBetween', 'preventiveTime', 'correctiveTime', 'package', 'orderNumber', 'cost', 'mechanic', 'observations'];
  const ROUTE_IMPORT_ORDER = ['startDate', 'endDate', 'plate', 'kmStart', 'kmEnd', 'kms', 'hours', 'gallons', 'observations'];
  const PROJECT_THEMES = {
    auca: ['#1fe088', '#39d2ff', 'rgba(31, 224, 136, 0.16)'],
    petroecuador: ['#ffb020', '#1fe088', 'rgba(255, 176, 32, 0.16)'],
    shaya: ['#8f7cff', '#39d2ff', 'rgba(143, 124, 255, 0.16)'],
    enap: ['#39d2ff', '#8f7cff', 'rgba(57, 210, 255, 0.16)'],
    baseort: ['#ff4d6d', '#ffb020', 'rgba(255, 77, 109, 0.15)'],
    pcr: ['#15c8c8', '#1fe088', 'rgba(21, 200, 200, 0.16)']
  };

  document.addEventListener('DOMContentLoaded', () => {
    bindUi();
    google.charts.setOnLoadCallback(initApp);
  });

  function bindUi() {
    document.querySelectorAll('.tab').forEach((btn) => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    ['yearFilter', 'monthFilter', 'projectFilter', 'plateFilter'].forEach((id) => {
      document.getElementById(id).addEventListener('change', handleFilterChange);
    });
    document.getElementById('openFleetImportBtn').addEventListener('click', openContextImportModal);
    document.getElementById('exportPdfBtn').addEventListener('click', () => window.print());
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('routeForm').addEventListener('submit', submitRoute);
    document.querySelectorAll('#routeForm [name="kmStart"], #routeForm [name="kmEnd"]').forEach((input) => {
      input.addEventListener('input', updateRouteTotalKm);
    });
    document.getElementById('maintenanceForm').addEventListener('submit', submitMaintenance);
    document.getElementById('fleetForm').addEventListener('submit', submitFleet);
    document.getElementById('maintenanceType').addEventListener('change', fillPackageOptions);
    const drivePdfBtn = document.getElementById('drivePdfBtn');
    if (drivePdfBtn) drivePdfBtn.addEventListener('click', createDrivePdf);
    document.getElementById('saveFleetProjectsBtn').addEventListener('click', saveFleetProjectChanges);
    document.getElementById('dedupeFleetBtn').addEventListener('click', cleanFleetDuplicates);
    document.getElementById('dedupeMaintenanceBtn').addEventListener('click', cleanMaintenanceDuplicates);
    document.getElementById('dedupeRoutesBtn').addEventListener('click', cleanRouteDuplicates);
    document.getElementById('saveRouteDeletesBtn').addEventListener('click', saveRouteDeletes);
    document.getElementById('closeFleetImportBtn').addEventListener('click', closeFleetImportModal);
    document.getElementById('fleetImportModal').addEventListener('click', (event) => {
      if (event.target.id === 'fleetImportModal') closeFleetImportModal();
    });
    document.getElementById('closeMaintenanceImportBtn').addEventListener('click', closeMaintenanceImportModal);
    document.getElementById('maintenanceImportModal').addEventListener('click', (event) => {
      if (event.target.id === 'maintenanceImportModal') closeMaintenanceImportModal();
    });
    document.getElementById('closeRouteImportBtn').addEventListener('click', closeRouteImportModal);
    document.getElementById('routeImportModal').addEventListener('click', (event) => {
      if (event.target.id === 'routeImportModal') closeRouteImportModal();
    });
    document.getElementById('fleetImportCsvBtn').addEventListener('click', importFleetCsvText);
    document.getElementById('fleetImportFileBtn').addEventListener('click', importFleetFile);
    document.getElementById('maintenanceImportCsvBtn').addEventListener('click', importMaintenanceCsvText);
    document.getElementById('maintenanceImportFileBtn').addEventListener('click', importMaintenanceFile);
    document.getElementById('routeImportCsvBtn').addEventListener('click', importRouteCsvText);
    document.getElementById('routeImportFileBtn').addEventListener('click', importRouteFile);
    document.getElementById('printAlertsBtn').addEventListener('click', () => window.print());
    document.getElementById('driveAlertsPdfBtn').addEventListener('click', createAlertsPdf);
    const importCsvBtn = document.getElementById('importCsvBtn');
    if (importCsvBtn) importCsvBtn.addEventListener('click', importCsv);
    const importSheetBtn = document.getElementById('importSheetBtn');
    if (importSheetBtn) importSheetBtn.addEventListener('click', importSheet);
    window.addEventListener('resize', debounce(() => renderActive(), 250));
  }

  async function initApp() {
    showLoading(true);
    try {
      state.bootstrap = await runServer('getBootstrapData');
      fillFilters();
      applyProjectTheme();
      updateVehicleSelects();
      updateFilterVisibility();
      fillPackageOptions();
      await refreshCurrent();
    } catch (err) {
      notify(err.message || err, true);
    } finally {
      showLoading(false);
    }
  }

  function runServer(name, payload) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)[name](payload);
    });
  }

  function fillFilters() {
    const b = state.bootstrap;
    const previous = state.filters || {};
    fillSelect('yearFilter', b.years, null, previous.year || String(new Date().getFullYear()));
    fillMonthSelect();
    fillSelect('projectFilter', [''].concat(b.projects), 'Todos', previous.project);
    document.querySelectorAll('[data-project-select]').forEach((sel) => fillSelectElement(sel, b.projects));
    fillDatalist('typeOptions', b.types);
    fillDatalist('brandOptions', b.brands);
    if (previous.month !== undefined) document.getElementById('monthFilter').value = previous.month || '';
    applyProjectTheme();
  }

  function fillMonthSelect() {
    const select = document.getElementById('monthFilter');
    select.innerHTML = state.bootstrap.config.monthOptions.map((item) => (
      `<option value="${item.value}">${item.label}</option>`
    )).join('');
  }

  function fillSelect(id, items, emptyLabel, preferred) {
    fillSelectElement(document.getElementById(id), items, emptyLabel, preferred);
  }

  function fillSelectElement(select, items, emptyLabel, preferred) {
    select.innerHTML = '';
    items.forEach((item) => {
      const opt = document.createElement('option');
      opt.value = item || '';
      opt.textContent = item || emptyLabel || 'Todos';
      if (preferred && String(item) === String(preferred)) opt.selected = true;
      select.appendChild(opt);
    });
  }

  function fillDatalist(id, items) {
    const list = document.getElementById(id);
    list.innerHTML = items.map((item) => `<option value="${escapeHtml(item)}"></option>`).join('');
  }

  function updateVehicleSelects() {
    const filters = readFilters();
    const vehicles = state.bootstrap.vehicles.filter((v) => {
      if (filters.project && norm(v.project) !== norm(filters.project)) return false;
      return true;
    });
    const plateFilter = document.getElementById('plateFilter');
    const selected = plateFilter.value;
    fillSelectElement(plateFilter, [''].concat(vehicles.map((v) => v.plate)), 'Todas');
    if (vehicles.some((v) => v.plate === selected)) plateFilter.value = selected;
    document.querySelectorAll('[data-vehicle-select]').forEach((sel) => {
      fillSelectElement(sel, vehicles.map((v) => v.plate));
    });
  }

  function readFilters() {
    return {
      year: Number(document.getElementById('yearFilter').value),
      month: Number(document.getElementById('monthFilter').value || 0),
      project: document.getElementById('projectFilter').value,
      plate: document.getElementById('plateFilter').value
    };
  }

  function readGeneralFilters() {
    return {
      year: Number(document.getElementById('yearFilter').value),
      project: document.getElementById('projectFilter').value
    };
  }

  function readAlertFilters() {
    return {
      project: document.getElementById('projectFilter').value
    };
  }

  function updateFilterVisibility() {
    const generalOnly = state.activeTab === 'general';
    const alertsOnly = state.activeTab === 'alerts';
    const fleetOnly = state.activeTab === 'fleet';
    const reportsOnly = state.activeTab === 'reports';
    document.querySelector('.filter-year').classList.toggle('hidden-filter', alertsOnly);
    document.querySelector('.filter-month').classList.toggle('hidden-filter', generalOnly || alertsOnly || fleetOnly);
    document.querySelector('.filter-plate').classList.toggle('hidden-filter', generalOnly || alertsOnly);
    document.getElementById('openFleetImportBtn').classList.toggle('hidden', reportsOnly);
  }

  async function handleFilterChange(event) {
    if (event.target.id === 'projectFilter') applyProjectTheme();
    if (event.target.id !== 'plateFilter') updateVehicleSelects();
    await refreshCurrent();
  }

  function applyProjectTheme() {
    const project = document.getElementById('projectFilter') ? document.getElementById('projectFilter').value : '';
    const theme = PROJECT_THEMES[norm(project)] || ['#39d2ff', '#8f7cff', 'rgba(57, 210, 255, 0.14)'];
    document.documentElement.style.setProperty('--project-accent', theme[0]);
    document.documentElement.style.setProperty('--project-accent-2', theme[1]);
    document.documentElement.style.setProperty('--project-soft', theme[2]);
  }

  function monthName(month) {
    const item = state.bootstrap.config.monthOptions.find((option) => Number(option.value) === Number(month));
    return item ? item.label : '';
  }

  async function refreshCurrent() {
    state.filters = readFilters();
    showLoading(true);
    try {
      if (state.activeTab === 'dashboard') {
        state.dashboard = await runServer('getDashboardData', state.filters);
        renderDashboard();
      } else if (state.activeTab === 'general') {
        state.general = await runServer('getGeneralReportData', readGeneralFilters());
        renderGeneral();
      } else if (state.activeTab === 'alerts') {
        const data = await runServer('getAlertsData', readAlertFilters());
        state.alerts = data.alerts;
        renderAlerts(state.alerts);
      } else if (state.activeTab === 'routes') {
        renderRoutesTable();
      } else if (state.activeTab === 'maintenance') {
        renderMaintenanceTable();
      } else if (state.activeTab === 'fleet') {
        renderFleetTable();
      } else if (state.activeTab === 'reports') {
        await renderReportsPreview();
      }
    } catch (err) {
      notify(err.message || err, true);
    } finally {
      showLoading(false);
    }
  }

  function renderActive() {
    if (state.activeTab === 'dashboard' && state.dashboard) renderDashboard();
    if (state.activeTab === 'general' && state.general) renderGeneral();
    if (state.activeTab === 'alerts' && state.alerts) renderAlerts(state.alerts);
  }

  async function switchTab(tab) {
    state.activeTab = tab;
    document.querySelectorAll('.tab').forEach((b) => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.view').forEach((v) => v.classList.toggle('active', v.id === tab));
    updateFilterVisibility();
    await refreshCurrent();
  }

  function renderDashboard() {
    const data = state.dashboard;
    if (!data) return;
    document.getElementById('vehicleBadge').textContent = [
      data.vehicle.plate || 'Todos',
      data.vehicle.brand,
      data.vehicle.type
    ].filter(Boolean).join(' · ');
    const metric = data.metric || defaultMetric();
    document.getElementById('chartTotalKmsTitle').textContent = metric.totalTitle || 'Kilometros recorridos totales';
    document.getElementById('chartKmPerMaintenanceTitle').textContent = metric.maintenanceTitle || 'Kilometros por mantenimiento';
    renderKpiCards(data.summary, data.yearSummary, data.periodLabel, metric);
    drawTotalKms(data.chartSeries, metric);
    drawTotalGallons(data.chartSeries);
    drawKmPerGallon(data.chartSeries, metric);
    drawMaintenance(data.chartSeries);
    drawMaintenanceCosts(data.chartSeries);
    drawKmPerMaintenance(data.chartSeries, metric);
    drawMtbf(data.chartSeries);
    drawMttr(data.chartSeries);
    drawAvailabilityTrend(data.chartSeries);
    renderRanking(data.ranking);
    renderAlertList(data.alerts, 'alertList');
    renderMonthlyKpiTable(data.monthlyKpis, data.filters.month);
  }

  function renderKpiCards(summary, yearSummary, periodLabel, metric) {
    metric = metric || defaultMetric();
    const cards = [
      [`${metric.totalLabel} periodo`, fmt(summary.kms), metric.unit, 'cyan', `Total año: ${fmt(yearSummary.kms)} ${metric.unit}`],
      ['Galones periodo', fmt(summary.gallons), 'gal', 'violet', `Total año: ${fmt(yearSummary.gallons)} gal`],
      [metric.perFuelLabel, fmt(summary.kmPerGallon), metric.perFuelUnit, 'green', `Año: ${fmt(yearSummary.kmPerGallon)} ${metric.perFuelUnit}`],
      ['Disponibilidad', fmt(summary.availability), '%', 'amber', `Año: ${fmt(yearSummary.availability)}%`],
      ['Preventivos', fmt(summary.preventive), 'und', 'blue', `Año: ${fmt(yearSummary.preventive)}`],
      ['Correctivos', fmt(summary.corrective), 'und', 'red', `Año: ${fmt(yearSummary.corrective)}`],
      [metric.perMaintenanceLabel, fmt(summary.kmPerMaintenance), metric.perMaintenanceUnit, 'teal', `Año: ${fmt(yearSummary.kmPerMaintenance)} ${metric.perMaintenanceUnit}`],
      ['MTTR / MTBF', `${fmt(summary.mttr)} / ${fmt(summary.mtbf)}`, 'h', 'orange', periodLabel]
    ];
    document.getElementById('kpiCards').innerHTML = cards.map(([label, value, unit, tone, note]) => `
      <div class="kpi-card ${tone}">
        <span>${label}</span>
        <strong>${value}</strong>
        <small>${unit} · ${note}</small>
      </div>
    `).join('');
  }

  function renderMonthlyKpiTable(rows, selectedMonth) {
    const months = state.bootstrap.config.monthNames;
    document.getElementById('monthlyKpiTable').innerHTML = `
      <thead><tr><th>Indicador</th>${months.map((m, i) => `<th class="${selectedMonth === i + 1 ? 'selected-month' : ''}">${m}</th>`).join('')}<th>Total</th></tr></thead>
      <tbody>${rows.map((r) => `<tr><td>${r.label}</td>${r.values.map((v, i) => `<td class="${selectedMonth === i + 1 ? 'selected-month' : ''}">${fmt(v)}</td>`).join('')}<td>${fmt(r.total)}</td></tr>`).join('')}</tbody>
    `;
  }

  function drawTotalKms(series, metric) {
    metric = metric || defaultMetric();
    const data = google.visualization.arrayToDataTable([
      ['Mes', metric.totalLabel, { role: 'style' }, { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [m.month, m.kms, m.selected ? 'color:#39d2ff;stroke-color:#ffffff;stroke-width:2' : 'color:#159ed3', tooltip(metric.totalLabel, m.month, `${fmt(m.kms)} ${metric.unit}`)])
    ]);
    new google.visualization.ColumnChart(document.getElementById('chartTotalKms')).draw(data, chartOptions({ colors: ['#39d2ff'] }));
  }

  function drawTotalGallons(series) {
    const data = google.visualization.arrayToDataTable([
      ['Mes', 'Galones', { role: 'style' }, { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [m.month, m.gallons, m.selected ? 'color:#b78cff;stroke-color:#ffffff;stroke-width:2' : 'color:#7f5af0', tooltip('Galones cargados', m.month, `${fmt(m.gallons)} gal`)])
    ]);
    new google.visualization.ColumnChart(document.getElementById('chartTotalGallons')).draw(data, chartOptions({ colors: ['#7f5af0'] }));
  }

  function drawMaintenance(series) {
    const data = google.visualization.arrayToDataTable([
      ['Mes', 'Preventivos', 'Correctivos', { role: 'annotation' }],
      ...series.map((m) => [m.month, m.preventive, m.corrective, m.selected ? 'Mes elegido' : null])
    ]);
    new google.visualization.ColumnChart(document.getElementById('chartMaintenance')).draw(data, chartOptions({ isStacked: true, colors: ['#1fe088', '#ff4d6d'] }));
  }

  function drawKmPerGallon(series, metric) {
    metric = metric || defaultMetric();
    const label = metric.isHourBased ? 'Horas por galon' : 'Kilometros por galon';
    const unit = metric.isHourBased ? 'h/gal' : 'km/gal';
    const data = google.visualization.arrayToDataTable([
      ['Mes', label, { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [
        m.month,
        m.kmPerGallon,
        tooltip(label, m.month, `${fmt(m.kmPerGallon)} ${unit}<br>${fmt(m.kms)} ${metric.unit} / ${fmt(m.gallons)} gal`)
      ])
    ]);
    new google.visualization.LineChart(document.getElementById('chartKmPerGallon')).draw(data, chartOptions({
      colors: ['#1fe088'],
      curveType: 'function',
      lineWidth: 4,
      pointSize: 8,
      vAxis: { title: unit, textStyle: { color: '#b8c7d9' }, titleTextStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } }
    }));
  }

  function drawMaintenanceCosts(series) {
    const data = google.visualization.arrayToDataTable([
      ['Mes', 'Preventivo $', 'Correctivo $', { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [
        m.month,
        m.preventiveCost,
        m.correctiveCost,
        tooltip('Costos por mantenimiento', m.month, `Preventivo: ${money(m.preventiveCost)}<br>Correctivo: ${money(m.correctiveCost)}<br>Total: ${money(m.maintenanceCost)}`)
      ])
    ]);
    new google.visualization.LineChart(document.getElementById('chartMaintenanceCosts')).draw(data, chartOptions({
      colors: ['#1fe088', '#ff4d6d'],
      curveType: 'function',
      lineWidth: 4,
      pointSize: 8,
      vAxis: { title: 'USD', format: '$#,##0', textStyle: { color: '#b8c7d9' }, titleTextStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } }
    }));
  }

  function drawKmPerMaintenance(series, metric) {
    metric = metric || defaultMetric();
    const data = google.visualization.arrayToDataTable([
      ['Mes', `Real ${metric.perMaintenanceUnit}`, 'Esperado fabricante', 'Desfase'],
      ...series.map((m) => [m.month, m.kmPerMaintenance, m.expectedKmPerMaintenance, m.maintenanceDeviation])
    ]);
    new google.visualization.ComboChart(document.getElementById('chartKmPerMaintenance')).draw(data, chartOptions({
      seriesType: 'bars',
      series: {
        1: { type: 'line', lineWidth: 4, pointSize: 7 },
        2: { type: 'line', lineWidth: 3, pointSize: 6, targetAxisIndex: 1 }
      },
      colors: ['#39d2ff', '#1fe088', '#ffb020'],
      vAxes: {
        0: { title: metric.perMaintenanceLabel, textStyle: { color: '#b8c7d9' }, titleTextStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } },
        1: { title: 'Desfase', textStyle: { color: '#b8c7d9' }, titleTextStyle: { color: '#b8c7d9' }, gridlines: { color: 'transparent' } }
      }
    }));
  }

  function drawMtbf(series) {
    const data = google.visualization.arrayToDataTable([
      ['Mes', 'MTBF', { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [
        m.month,
        m.mtbf,
        tooltip('Tiempo medio entre fallas (MTBF)', m.month, `MTBF: ${fmt(m.mtbf)} h<br>Tiempo programado: ${fmt(m.plannedHours)} h<br>Tiempo preventivo: ${fmt(m.preventiveTime)} h<br>Tiempo correctivo: ${fmt(m.correctiveTime)} h<br>Fallas: ${fmt(m.corrective)}`)
      ])
    ]);
    new google.visualization.ColumnChart(document.getElementById('chartMtbf')).draw(data, chartOptions({
      colors: ['#8f7cff'],
      vAxis: { title: 'Horas entre fallas', textStyle: { color: '#b8c7d9' }, titleTextStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } }
    }));
  }

  function drawMttr(series) {
    const data = google.visualization.arrayToDataTable([
      ['Mes', 'MTTR', { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [
        m.month,
        m.mttr,
        tooltip('Tiempo medio entre reparacion (MTTR)', m.month, `MTTR: ${fmt(m.mttr)} h<br>Tiempo correctivo: ${fmt(m.correctiveTime)} h<br>Reparaciones/Fallas: ${fmt(m.corrective)}`)
      ])
    ]);
    new google.visualization.ColumnChart(document.getElementById('chartMttr')).draw(data, chartOptions({
      colors: ['#ffb020'],
      vAxis: { title: 'Horas por reparacion', textStyle: { color: '#b8c7d9' }, titleTextStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } }
    }));
  }

  function drawAvailabilityTrend(series) {
    const data = google.visualization.arrayToDataTable([
      ['Mes', 'Disponibilidad MTBF/MTTR', 'Disponibilidad Operativa', { role: 'tooltip', type: 'string', p: { html: true } }],
      ...series.map((m) => [
        m.month,
        m.availability,
        m.operationalAvailability,
        tooltip('Disponibilidad del equipo', m.month, `MTBF/MTTR: ${fmt(m.availability)}%<br>Operativa: ${fmt(m.operationalAvailability)}%<br>Horas programadas: ${fmt(m.plannedHours)} h<br>Horas fuera de servicio: ${fmt(m.downtimeHours)} h`)
      ])
    ]);
    new google.visualization.AreaChart(document.getElementById('chartAvailability')).draw(data, chartOptions({
      colors: ['#1fe088', '#39d2ff'],
      vAxis: { minValue: 0, maxValue: 100, textStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } },
      areaOpacity: 0.22,
      lineWidth: 4,
      pointSize: 7
    }));
  }

  function chartOptions(extra) {
    return Object.assign({
      height: 300,
      legend: { position: 'bottom', textStyle: { color: '#dce8f5' } },
      chartArea: { left: 56, top: 24, right: 24, bottom: 58 },
      backgroundColor: 'transparent',
      fontName: 'Arial',
      focusTarget: 'category',
      aggregationTarget: 'category',
      selectionMode: 'multiple',
      tooltip: { isHtml: true, trigger: 'focus' },
      crosshair: { trigger: 'both', orientation: 'vertical', color: '#39d2ff', opacity: 0.35 },
      animation: { startup: true, duration: 600, easing: 'out' },
      hAxis: { textStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } },
      vAxis: { minValue: 0, textStyle: { color: '#b8c7d9' }, gridlines: { color: '#26384a' } }
    }, extra || {});
  }

  function tooltip(title, month, value) {
    return `<div class="chart-tooltip"><b>${title}</b><span>${month}</span><strong>${value}</strong></div>`;
  }

  function renderRanking(rows) {
    const top = rows.slice(0, 8);
    const max = Math.max(...top.map((r) => r.kms), 1);
    document.getElementById('rankingList').innerHTML = top.map((r) => `
      <div class="rank-row">
        <strong>${escapeHtml(r.plate)}</strong>
        <div><div class="bar"><i style="width:${Math.min(100, (r.kms / max) * 100)}%"></i></div><small>${escapeHtml(r.brand || '')} ${escapeHtml(r.type || '')}</small></div>
        <span>${fmt(r.kms)} km</span>
      </div>
    `).join('');
  }

  function renderAlertList(alerts, id) {
    document.getElementById(id).innerHTML = alerts.map((a) => alertRow(a)).join('') || '<p class="muted">Sin alertas para los filtros actuales.</p>';
  }

  function renderAlerts(alerts) {
    const rows = alerts || [];
    const summary = rows.reduce((acc, item) => {
      acc[item.severity] = (acc[item.severity] || 0) + 1;
      return acc;
    }, { ok: 0, warning: 0, critical: 0 });

    if (!rows.length) {
      document.getElementById('alertBoard').innerHTML = `
        <div class="panel alert-empty">
          <h3>Sin vehiculos para el proyecto seleccionado</h3>
          <p class="muted">Cuando agregues vehiculos en Flota Vehicular y cargues rutas o mantenimientos, apareceran aqui automaticamente.</p>
        </div>
      `;
      return;
    }

    document.getElementById('alertBoard').innerHTML = `
      <div class="alerts-summary">
        <div class="alert-summary-card critical"><span>Vencidos o urgentes</span><strong>${fmt(summary.critical)}</strong></div>
        <div class="alert-summary-card warning"><span>Proximos</span><strong>${fmt(summary.warning)}</strong></div>
        <div class="alert-summary-card ok"><span>En rango</span><strong>${fmt(summary.ok)}</strong></div>
      </div>
      <div class="panel alerts-control-panel">
        <div class="panel-head">
          <h3>Panel vertical de mantenimiento preventivo</h3>
          <span class="badge">${escapeHtml(document.getElementById('projectFilter').value || 'Todos los proyectos')}</span>
        </div>
        <div class="table-scroll alerts-scroll">
          <table class="alerts-table">

  function lifeCellStyle(percent) {
    const hue = Math.round(percent * 1.2);

  function maintenanceHoursByType(row, kind) {
    const type = norm(row.type);
    const isCorrective = type.includes('correct');
    const isPreventive = type.includes('prevent') || type.includes('prev');
    if (kind === 'corrective' && !isCorrective) return 0;
    if (kind === 'preventive' && (!isPreventive || isCorrective)) return 0;
    const explicit = kind === 'corrective' ? Number(row.correctiveTime || 0) : Number(row.preventiveTime || 0);
    if (explicit) return explicit;
    const entry = row.entryDate ? new Date(row.entryDate) : null;
    const exit = row.exitDate ? new Date(row.exitDate) : null;
    if (entry && exit && Number.isFinite(entry.getTime()) && Number.isFinite(exit.getTime())) {
      return Math.max(0, (exit.getTime() - entry.getTime()) / 3600000);
    }
    return 0;
  }

      return true;

    return vehicles.reduce((acc, row) => {
      if (filters.plate && norm(row.plate) !== norm(filters.plate)) return acc;
      const project = row.project || 'Sin proyecto';
      acc[project] = (acc[project] || 0) + 1;
      return acc;
    }, {});

  function routeRowsFromMatrix(matrix) {
    const clean = matrix
      .map((row) => row.map((cell) => String(cell == null ? '' : cell).trim()))
      .filter((row) => row.some(Boolean));
    if (!clean.length) return [];
    const first = clean[0].map(norm);
    const hasHeader = first.some((cell) => ['fechainicio', 'fechadeinicio', 'fechafinal', 'placa', 'kminicial', 'kmfinal'].indexOf(cell) >= 0);
    if (hasHeader) {
      const headers = clean.shift();
      return clean.map((row) => {
        const obj = {};
        headers.forEach((header, index) => {
          const field = routeFieldFromHeader(header);
          if (field) obj[field] = row[index] || '';
        });
        normalizeDecimalFields(obj, ['kmStart', 'kmEnd', 'kms', 'hours', 'gallons']);
        if (!obj.kms) obj.kms = Math.max(0, Number(obj.kmEnd || 0) - Number(obj.kmStart || 0));
        return obj;
      });
    }
    return clean.map((row) => {
      const obj = Object.fromEntries(ROUTE_IMPORT_ORDER.map((field, index) => [field, row[index] || '']));
      normalizeDecimalFields(obj, ['kmStart', 'kmEnd', 'kms', 'hours', 'gallons']);
      if (!obj.kms) obj.kms = Math.max(0, Number(obj.kmEnd || 0) - Number(obj.kmStart || 0));
      return obj;
    });
  }

  function parseCsv(text) {
    const lines = text.split(/\r?\n/).filter(Boolean);
    const rows = lines.map(splitCsvLine);
    const headers = rows.shift().map((h) => h.trim());
    return rows.map((r) => Object.fromEntries(headers.map((h, i) => [h, r[i] || ''])));
  }

  function parseCsvMatrix(text) {
    return text.split(/\r?\n/).filter(Boolean).map(splitCsvLine);
  }

  function splitCsvLine(line) {
    const decimalSentinel = '\u0007';
    line = line.replace(/(\d),(\d)/g, '$1' + decimalSentinel + '$2');
    const out = [];
    let cur = '';
    let quoted = false;
    const delimiter = (line.split(';').length > line.split(',').length) ? ';' : ',';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (ch === '"') quoted = !quoted;
      else if (ch === delimiter && !quoted) { out.push(cur.replaceAll(decimalSentinel, ',')); cur = ''; }
      else cur += ch;
    }
    out.push(cur.replaceAll(decimalSentinel, ','));
    return out;
  }

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('hidden', !show);
  }

  function notify(message, error) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.style.background = error ? '#d64545' : '#14212b';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  function defaultMetric() {
    return {
      isHourBased: false,
      unit: 'km',
      totalLabel: 'Km recorridos',
      totalTitle: 'Kilometros recorridos totales',
      perFuelLabel: 'Km por galon',
      perFuelUnit: 'km/gal',
      perMaintenanceLabel: 'Km por mantenimiento',
      perMaintenanceUnit: 'km/mto',
      maintenanceTitle: 'Kilometros por mantenimiento'
    };
  }

  function metricForPlate(plate) {
    const vehicle = vehicleByPlate(plate);
    const isHourBased = vehicle ? Boolean(vehicle.isHourBased) || isVacuumVehicle(vehicle) : false;
    if (!isHourBased) return defaultMetric();
    return {
      isHourBased: true,
      unit: 'h',
      totalLabel: 'Horas trabajadas',
      totalTitle: 'Horas trabajadas totales',
      perFuelLabel: 'Horas por galon',
      perFuelUnit: 'h/gal',
      perMaintenanceLabel: 'Horas por mantenimiento',
      perMaintenanceUnit: 'h/mto',
      maintenanceTitle: 'Horas por mantenimiento'
    };
  }

  function vehicleByPlate(plate) {
    if (!state.bootstrap || !plate) return null;
    return state.bootstrap.vehicles.find((v) => norm(v.plate) === norm(plate)) || null;
  }

  function isVacuumVehicle(vehicle) {
    return norm([vehicle.type, vehicle.brand, vehicle.model, vehicle.plate].filter(Boolean).join(' ')).includes('vacuum')
      || norm([vehicle.type, vehicle.brand, vehicle.model].filter(Boolean).join(' ')).includes('vacu');
  }

  function labelFor(key) {
    return ({
      startDate: 'Fecha de Inicio', endDate: 'Fecha Final', entryDate: 'Fecha de entrada', exitDate: 'Fecha de salida',
      plate: 'Placa', kmStart: 'Km / Horas inicial', kmEnd: 'Km / Horas final', kms: 'Total de Km / Horas', hours: 'Horas trabajadas', gallons: 'Cantidad de Galones cargados', observations: 'Observaciones',
      workshop: 'Taller', type: 'Tipo', odometer: 'Kilometraje / Horas', kmBetween: 'Km / Horas entre mantenimiento', package: 'Paquete', orderNumber: 'Numero de orden', mechanic: 'Mecanico',
      project: 'Proyecto', brand: 'Marca', model: 'Modelo', year: 'Ano', color: 'Color', motorCycleKm: 'Ciclo'
    })[key] || key;
  }

  function formatCell(value) {
    if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}T/.test(value)) return new Date(value).toLocaleDateString();
    return escapeHtml(value == null ? '' : value);
  }

  function formatDateShort(value) {
    if (!value) return '';
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return escapeHtml(value);
    return date.toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: '2-digit' });
  }

  function fmt(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return value || '0';
    return n.toLocaleString('es-EC', { maximumFractionDigits: 2 });
  }

  function money(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return '$0.00';
    return n.toLocaleString('es-EC', { style: 'currency', currency: 'USD', minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function parseDecimal(value) {
    if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
    if (value === null || value === undefined || value === '') return 0;
    const cleaned = String(value).trim().replace(/\s/g, '');
    const normalized = cleaned.indexOf(',') >= 0 && cleaned.indexOf('.') >= 0
      ? cleaned.replace(/\./g, '').replace(',', '.')
      : cleaned.replace(',', '.');
    const n = Number(normalized.replace(/[^\d.-]/g, ''));
    return Number.isFinite(n) ? n : 0;
  }

  function normalizeDecimalFields(obj, fields) {
    fields.forEach((field) => {
      if (obj[field] !== undefined && obj[field] !== '') obj[field] = String(parseDecimal(obj[field]));
    });
    return obj;
  }

  function norm(value) {
    return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function cssEscape(value) {
    if (window.CSS && CSS.escape) return CSS.escape(value);
    return String(value).replace(/["\\]/g, '\\$&');
  }

  function debounce(fn, ms) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), ms);
    };
  }
</script>
